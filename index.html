<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Jogo da Velha</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Jogo da Velha</h1>

<div class="modo">
<button onclick="modoJogador()">2 Jogadores</button>
<button onclick="modoMaquina()">Contra Máquina</button>
</div>

<div class="dificuldade">
<h3>Dificuldade</h3>

<button onclick="setDificuldade('facil')">Fácil</button>
<button onclick="setDificuldade('medio')">Médio</button>
<button onclick="setDificuldade('dificil')">Difícil</button>
</div>

<div id="tabuleiro">

<div class="casa" onclick="jogar(this,0)"></div>
<div class="casa" onclick="jogar(this,1)"></div>
<div class="casa" onclick="jogar(this,2)"></div>

<div class="casa" onclick="jogar(this,3)"></div>
<div class="casa" onclick="jogar(this,4)"></div>
<div class="casa" onclick="jogar(this,5)"></div>

<div class="casa" onclick="jogar(this,6)"></div>
<div class="casa" onclick="jogar(this,7)"></div>
<div class="casa" onclick="jogar(this,8)"></div>

</div>

<h2 id="status">Escolha o modo de jogo</h2>

<button onclick="reiniciar()">Reiniciar</button>

<div id="resultado">

<div id="textoResultado"></div>

<button onclick="reiniciar()">Jogar novamente</button>

</div>

<footer>
Feito por Cleberson & Daniel © 2026 - Todos os direitos reservados
</footer>

<script src="script.js"></script>

</body>
</html>
